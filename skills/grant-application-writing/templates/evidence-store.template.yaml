# ─────────────────────────────────────────────────────────────────────────────
# evidence-store.yaml — reusable track-record base (Stage B)  [TEMPLATE]
# ─────────────────────────────────────────────────────────────────────────────
# Every claim a drafted field makes must trace to a row here with a provenance
# pointer and a trust profile. This module is reusable across every application
# (and graduates to `research-profile-evidence-base` for CVs / biosketches).
# Ships ABSTRACTIONS ONLY — replace every <PLACEHOLDER> row.
#
# HARDENED TRUST FIELDS (attach to EVERY evidentiary row; see references/evidence-store.md):
#   status           — legal / publication state:  granted|filed | published|in-press|in-review | awarded|submitted|not-funded
#   confidence        — evidentiary certainty:      high | medium | low   (SEPARATE from status)
#   source_authority  — who vouches for it:         official-record | orcid | scopus | scholar | self-reported
#   as_of             — date this row was verified:  YYYY-MM-DD
#   validity_window   — {from, to} the claim is true within (e.g. eligibility timeline); to: null = open
#   sensitivity       — disclosure risk:            public | internal | embargoed | confidential
#   use_permission    — may it appear in an application: public | internal | embargoed
#   defensibility     — DERIVED, do not hand-author: computed from status × confidence × source_authority (see note at foot)
# ─────────────────────────────────────────────────────────────────────────────
# ROPE + SOURCED-EMINENCE FIELDS (attach to EVERY track-record row — pub/funding/award/service/supervision/impact):
#   window       — career-relative bound the count is stated against (ROPE): since-PhD | last-5y | since-YYYY
#   role         — the role the count is claimed under (NEVER upgraded): pub first|corresponding | funding CI|PI|co-I |
#                  supervision principal|co | service chair|editor|committee-member | award sole|co-recipient | impact lead|contributor
#   attributor   — external validator that makes a superlative SOURCED: ranking body | award name | flagship venue |
#                  units-sold/adoption figure | an evidence-store id.  null ⇒ statable, but NOT as a superlative
#   The drafting layer renders "sourced eminence" + "relative-to-opportunity" FROM these fields — never improvised.
#   A superlative with no attributor derives to a LOWER defensibility tier. Feeds number-defensibility prong 2
#   (fellowship) in method-passes.md + author-voice.md §8.
# ─────────────────────────────────────────────────────────────────────────────

# ─── Owner — top-level applicant block + disambiguation anchors (resolve every ingest against these) ───
owner:
  name: "<applicant full name>"
  orcid: "<0000-0000-0000-0000>"
  scopus_author_id: "<scopus author id>"
  known_name_variants: ["<J. Q. Researcher>", "<Q. Jane>"]   # collision guard — name-only matches are quarantined, never auto-merged
  affiliation_history:
    - {org: "<current org>", from: "<YYYY-MM>", to: null}     # to: null = current; scopes name-variant matching by date
  as_of: "<YYYY-MM-DD>"                          # store-wide last full refresh

# ─── Metrics — a MAP keyed by metric name (NOT a list); most volatile, date every one ───
metrics:
  h_index:         {value: <N>, source_authority: <scopus | scholar | orcid>, as_of: "<YYYY-MM-DD>", confidence: <high | medium | low>}
  i10_index:       {value: <N>, source_authority: <scopus | scholar | orcid>, as_of: "<YYYY-MM-DD>"}
  total_citations: {value: <N>, source_authority: <scopus | scholar | orcid>, as_of: "<YYYY-MM-DD>"}
  # metrics are source-stamped: Scholar h-index != Scopus h-index; never merge silently. A metric with no as_of is uncitable.

# ─── Career dates — a MAP keyed by date id (NOT a list); drives eligibility windows + scoring_adjustment ───
dates:
  phd_conferral:
    value: "<YYYY-MM-DD>"
    provenance: "<testamur / official record path>"
    source_authority: official-record
    confidence: high
    as_of: "<YYYY-MM-DD>"
    sensitivity: public
    use_permission: public
  <career-interruption-id>:                      # feeds the eligibility-window computed gate + scoring_adjustment
    value: {from: "<YYYY-MM>", to: "<YYYY-MM>", fte_fraction: <0.0-1.0>, reason: "<e.g. parental leave>"}
    provenance: "<HR record / declaration path>"
    source_authority: <official-record | self-reported>
    confidence: <high | medium | low>
    as_of: "<YYYY-MM-DD>"
    sensitivity: confidential                     # personal circumstances — usually not assessor-visible
    use_permission: internal

# ─── Publications ───
publications:
  - id: <pub-key>                               # stable local key referenced by drafted fields
    citation: "<full citation string>"
    year: <YYYY>
    venue: "<venue name>"
    role: <first | corresponding | co-first | senior | co-author>   # NEVER upgraded; the drafted verb must survive this
    window: <since-PhD | last-5y | since-YYYY>    # ROPE bound a paper-count is stated against
    attributor: <null | flagship-venue name | evidence id>   # external validator for a superlative; null ⇒ NOT statable as a superlative
    doi: "<10.xxxx/...>"
    provenance: "<source file / path this row was extracted from>"
    # ── trust profile ──
    status: <published | in-press | in-review>
    confidence: <high | medium | low>
    source_authority: <official-record | orcid | scopus | scholar | self-reported>
    as_of: "<YYYY-MM-DD>"
    validity_window: {from: "<YYYY-MM-DD>", to: null}
    sensitivity: <public | internal | embargoed | confidential>
    use_permission: <public | internal | embargoed>
    # defensibility: <DERIVED — leave to the pipeline; do not hand-set>

# ─── Funding (grants held / applied) ───
funding:
  - id: <grant-key>
    title: "<grant title>"
    scheme: "<funder + scheme>"
    role: <CI | PI | co-I>                        # the role the grant count is claimed under (NOT scholarship/stipend)
    window: <since-PhD | last-5y | since-YYYY>    # ROPE bound for grant tallies (e.g. "grants won since PhD")
    attributor: <null | scheme/award name | evidence id>   # required to state a superlative ("largest…"); null ⇒ no superlative
    amount: {value: <NNNNN>, currency: "<CUR>"}
    period: {from: "<YYYY-MM>", to: "<YYYY-MM>"}
    provenance: "<award letter / record path>"
    status: <awarded | submitted | not-funded>
    confidence: <high | medium | low>
    source_authority: <official-record | self-reported>
    as_of: "<YYYY-MM-DD>"
    validity_window: {from: "<YYYY-MM-DD>", to: "<YYYY-MM-DD>"}
    sensitivity: <public | internal | confidential>
    use_permission: <public | internal | embargoed>

# ─── Patents ───
patents:
  - id: <patent-key>
    title: "<patent title>"
    number: "<application or grant number>"
    jurisdiction: "<e.g. US / AU / WO(PCT)>"
    role: <inventor | co-inventor>
    provenance: "<patent office record path>"
    status: <granted | filed>                   # "granted" != "filed" — the drafted claim must match exactly
    confidence: <high | medium | low>
    source_authority: <official-record | self-reported>
    as_of: "<YYYY-MM-DD>"
    validity_window: {from: "<YYYY-MM-DD>", to: null}
    sensitivity: <public | internal | confidential>
    use_permission: <public | internal | embargoed>

# ─── Service (editorial, review, committee, community) ───
service:
  - id: <service-key>
    kind: <editorial-board | pc-member | reviewer | chair | community-lead>
    role: <chair | editor | committee-member>     # the role the service count is claimed under
    window: <since-PhD | last-5y | since-YYYY>     # ROPE bound for service tallies
    attributor: <null | named body/size | evidence id>   # required for "largest committee of…" etc.; null ⇒ no superlative
    detail: "<venue / body + years>"
    provenance: "<invitation / record path>"
    status: <ongoing | completed>
    confidence: <high | medium | low>
    source_authority: <official-record | self-reported>
    as_of: "<YYYY-MM-DD>"
    validity_window: {from: "<YYYY-MM-DD>", to: null}
    sensitivity: public
    use_permission: public

# ─── Awards / honours ───
awards:
  - id: <award-key>
    title: "<award name>"
    year: <YYYY>
    awarding_body: "<body>"
    provenance: "<citation / record path>"
    status: <awarded | nominated>
    confidence: <high | medium | low>
    source_authority: <official-record | self-reported>
    as_of: "<YYYY-MM-DD>"
    validity_window: {from: "<YYYY-MM-DD>", to: null}
    sensitivity: public
    use_permission: public

# ─── Governance blocks (store-level) — conflict resolution, refresh, audit, absence ───
source_precedence:                               # conflict-resolution ordering (high → low)
  default: [official-record, orcid, scopus, scholar, self-reported]
  # metrics: [scopus, scholar, orcid]            # per-field override allowed

refresh_policy:                                  # on read past ttl → freshness warning; past warn_after → block use until re-verified
  metrics:      {ttl_days: 30, warn_after_days: 45}   # citation counts drift fast
  publications: {ttl_days: 180}
  funding:      {ttl_days: 365}

# ─── Contradiction records — log source disagreements; do NOT silently pick one ───
contradiction_records:
  - claim_id: "<row id above>"
    field: "<which value disagrees, e.g. citation-count>"
    values: [{source: <scopus>, value: "<...>"}, {source: <scholar>, value: "<...>"}]
    resolution: "<which won + why, per source_precedence>"
    status: <open | resolved | wont-fix>
    as_of: "<YYYY-MM-DD>"

audit_log:                                       # append-only ingest / refresh trail
  - {ts: "<ISO8601>", action: <ingest | refresh>, target: "<row / metric id>", source: "<...>", method: "<text-extract | vision-ocr>"}

negative_evidence:                               # absence recorded explicitly, not left blank — a load-bearing signal
  - {claim: "<e.g. corresponding-author on pub-x>", status: unverified, reason: "<why it cannot be claimed yet>"}

# ─────────────────────────────────────────────────────────────────────────────
# defensibility (DERIVED): the pipeline computes a single tag from the trust
# profile — roughly, strong = {status settled, confidence high, authority official,
# inside validity_window, use_permission != embargoed}. It is NOT hand-authored
# here; splitting status vs confidence vs authority is the whole point (v1's single
# defensibility tag conflated legal-status with certainty).
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# entity-store.yaml — people / orgs / partners (Stage B2)  [TEMPLATE]
# ─────────────────────────────────────────────────────────────────────────────
# Project-mode companion to the evidence store. Holds the human + institutional
# side of a `prospective-project` application: CIs/PIs, participating orgs, and
# partner organisations with their roles, effort commitments, approvals, and
# cash + in-kind contributions. Ships ABSTRACTIONS ONLY — replace <PLACEHOLDER>s.
#
# Why a store: a partner org is often ONE logical entity spanning several form
# locations (pick-list + budget sub-table + classification + proforma letter)
# cross-validated by the portal. Model it once here; reference it by id everywhere.
# ─────────────────────────────────────────────────────────────────────────────

# ─── People (CIs / PIs / named personnel) ───
people:
  - id: <person-key>                            # stable key referenced by scheme.yaml fields + contributions below
    name: "<full name>"
    orcid: "<0000-0000-0000-0000>"
    organization: <org-key>                     # → organizations[].id
    role: <lead-CI | CI | co-I | PI | co-PI | AI | named-personnel>   # scheme's role vocabulary; never upgraded
    fte:                                         # effort commitment on THIS project
      fraction: <0.0-1.0>                        # per-person effort; may replicate per phase/year (per_person_multiplicity)
      by_year: {"<YYYY>": <0.0-1.0>}             # optional year-by-year split if the form asks
    approvals:                                   # sign-offs this person needs before submission
      - {kind: <head-of-school | co-investigator-consent | conflict-declaration>, status: <pending | obtained>, date: "<YYYY-MM-DD>"}
    profile_authority: "<RMS / SciENcv / ORCID record backing this person's CV>"   # linked-profile source, if used
    provenance: "<where these details came from>"

# ─── Organizations (applicant + participating institutions) ───
organizations:
  - id: <org-key>
    name: "<legal entity name>"
    kind: <administering | participating | eligible-recipient>
    identifiers: {abn_or_ein: "<...>", ror: "<https://ror.org/...>"}
    role: <administering-org | collaborating-org>
    approvals:
      - {kind: <authorised-officer-signoff | eligibility-attestation>, status: <pending | obtained>, date: "<YYYY-MM-DD>"}
    # ── institutional_support: the HOST-INSTITUTION STATEMENT's committed co-investment (3rd-party attestation; analog to partner contributions) ──
    # Only on the administering / lead org. Hardened like partner contributions (status + provenance).
    # Reconciled by method-passes.md §4.5 / validate_ir institutional-support-reconciliation — omit on participating orgs.
    institutional_support:
      items:                                     # each committed line — a non-cash line (teaching-relief) may carry value: null + basis
        - {kind: establishment-grant, value: <NNNNN>, currency: "<CUR>", status: <committed | indicative>, provenance: "<host-statement path>"}
        - {kind: stipend-topup,       value: <NNNNN>, currency: "<CUR>", status: <committed | indicative>, provenance: "<host-statement path>"}
        - {kind: salary-shortfall,    value: <NNNNN>, currency: "<CUR>", status: <committed | indicative>, provenance: "<host-statement path>"}
        - {kind: teaching-relief,     value: <NNNNN | null>, basis: "<e.g. reduced load funded from salary savings>", status: committed, provenance: "<host-statement path>"}
      total: {value: <NNNNN>, currency: "<CUR>"}   # the statement's STATED total — kept SEPARATE from sum(items) so a mismatch is VISIBLE (mirror partner letter_commitment)
      # ── protected_capacity: capacity-conversion — relief/coverage → PROTECTED RESEARCH TIME + execution capacity (not just $). Read by method-passes §4.5 ──
      protected_capacity:
        teaching_relief_to_research_days: <int | null>   # teaching-relief converted to protected research days/yr; null if committed but not quantified
        continuing_position: <true | false>              # a continuing (not fixed-term) position on success → sustained execution capacity
        note: "<how the relief / salary-cover becomes protected time the project can actually execute against>"
      # ── strategic_fit: the host-strategy ↔ candidate ↔ project TRIANGLE must be stated (not a one-sided 'good fit') ──
      strategic_fit: "<why the org recruited the candidate, how the project advances the org's strategy, and where the project finds a home — all three legs>"
      continuing_offer: "<continuing position on success — or null>"
      statement_provenance: "<host-institution statement path>"
    provenance: "<source record>"

# ─── Partner organizations (industry / non-admin partners with contributions) ───
# One partner is often a single entity spanning multiple form locations — model once here.
partners:
  - id: <partner-key>
    name: "<partner legal name>"
    kind: <industry | government | ngo | academic-external>
    classification: "<scheme partner-type code, if required>"     # e.g. G3/G4-style classification field
    contact: {name: "<contact>", role: "<title>", email: "<...>"}
    # ── legal_entity: which entity SIGNS vs OPERATES + their relationship (see references/evidence-store.md) ──
    legal_entity:
      signing_entity:   "<signing entity legal name>"     # who has authority to commit / signs the letter
      operating_entity: "<operating entity legal name>"   # who actually does the work / hosts the access
      relationship: <parent-subsidiary | jv | division | branch | same | consortium-member>
      jurisdiction: "<ISO country of the COMMITTING entity — feeds the offshore-partner / national-interest eligibility gate>"
      registration: {type: <ABN | EIN | company-no>, id: "<registration id>", source_authority: <official-record | self-reported>}
      capacity_evidence:                         # does the signer have authority + resources to commit?
        - {claim: "signing authority", provenance: "<signatory-title record path>", confidence: <high | medium | low>}
      flow_note: "<e.g. offshore parent commits cash, disbursed via onshore operating_entity — or null>"
    approvals:
      - {kind: <partner-declaration | letter-of-support | co-funding-commitment>, status: <pending | obtained>, date: "<YYYY-MM-DD>"}
    # ── contributions: the APPLICATION's figures — partner × contribution-type × year (mirrors contribution-matrix widget) ──
    contributions:
      - {type: cash,    fy: "<YYYY-YY>", amount: {value: <NNNNN>, currency: "<CUR>"}}
      - {type: in-kind, fy: "<YYYY-YY>", amount: {value: <NNNNN>, currency: "<CUR>"}, description: "<staff time / equipment / access>"}
      - {type: cash-staff, fy: "<YYYY-YY>", amount: {value: <NNNNN>, currency: "<CUR>"}, description: "<seconded personnel>"}
    # ── letter_commitment: what the SUPPORT LETTER literally states — kept SEPARATE from contributions so a mismatch is visible ──
    # Reconciled against contributions + budget line by §2.13 / validate_ir partner-commitment-reconciliation.
    letter_commitment:
      cash:    {value: <NNNNN>, currency: "<CUR>", conditional: <true | false>}
      in_kind: {value: <NNNNN>, currency: "<CUR>", conditional: <true | false>, description: "<staff time / access>"}
      role_stated: "<role the letter asserts — reconciled vs the claimed role>"
      personnel: ["<named contact the letter commits — must appear in the team table>"]
      provenance: "<support letter / signed LOI path — an email promise does NOT qualify a figure as committed>"
      as_of: "<YYYY-MM-DD>"
    depends_on:                                  # form locations this partner must stay consistent across (referential integrity)
      - "<scheme.yaml field id: partner pick-list>"
      - "<scheme.yaml field id: budget sub-table>"
      - "<attachment: partner proforma letter>"
    provenance: "<source record>"

# ─── Collaborators (specialist reach WITHOUT displacing applicant ownership) ───
# INDEPENDENCE-PLUS-NETWORK (§10.2): a collaborator extends specialist reach while the applicant keeps
# intellectual ownership. Name-dropping is defused by fielding the RELATIONSHIP, not the eminent name —
# a collaborator with no task_expertise + applicant_independence is decoration. Feeds author-voice.md §10.2.
collaborators:
  - id: <collaborator-key>
    name: "<full name>"
    organization: <org-key | "external org name">
    prior_relationship: "<how the applicant knows them — e.g. co-authored 1 paper 2yr ago; met at a workshop>"
    task_expertise: "<the specific capability they add, tied to a spine task / output id>"
    engagement_mode: <advisory | data-access | co-supervision | method-consult | letter-only>
    applicant_independence: "<what the applicant leads INDEPENDENTLY of this collaborator — evidences retained intellectual ownership>"
    provenance: "<support email / letter path>"

# ─── Mentors (differentiated by COMPETENCY GAP, not eminence) ───
# MENTOR-BY-COMPETENCY-GAP (§10.3): each mentor addresses a DISTINCT capability gap with a DIFFERENTIATED
# function — not a roster of interchangeable eminent names. A mentor with no competency + function is name-dropping.
mentors:
  - id: <mentor-key>
    name: "<full name>"
    organization: <org-key | "external org name">
    competency: "<the specific capability gap this mentor fills — NOT 'general guidance'>"
    function: "<the differentiated role — e.g. quarterly method review of task-2; industry-translation coaching>"
    prior_relationship: "<existing relationship, if any — or null>"
    provenance: "<mentorship statement path>"

# ─── Contribution roll-up (matches the funder's matched-funding / co-contribution gate) ───
# Recompute at check time — do not cache; the `computed` co-contribution gate reads this.
totals:
  cash_total:    {value: <NNNNN>, currency: "<CUR>"}
  in_kind_total: {value: <NNNNN>, currency: "<CUR>"}
  matched_ratio_required: "<e.g. 1:1 | 10%>"    # from compliance-matrix; validated as a computed gate

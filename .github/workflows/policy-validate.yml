name: policy-validate

# Smoke test for the policy engine + plugin structure. Gates on the four
# structural integrity sections of policy/validate.sh (profile includes resolve,
# integration markers valid, no orphan rules, registry consistent). Pre-existing
# cosmetic findings (e.g. fig severity=info) are tolerated; this guards against
# real regressions: a broken include path, an orphaned rule, a dangling marker,
# or a registry desync.

on:
  push:
    paths:
      - 'policy/**'
      - 'skills/**'
      - 'commands/**'
      - 'agents/**'
      - '.claude-plugin/**'
      - '.github/workflows/policy-validate.yml'
  pull_request:
    paths:
      - 'policy/**'
      - 'skills/**'
      - 'commands/**'
      - 'agents/**'
      - '.claude-plugin/**'
  workflow_dispatch:

jobs:
  structural-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Policy engine structural validation
        run: |
          out=$(bash policy/validate.sh 2>&1 | sed 's/\x1b\[[0-9;]*m//g') || true
          echo "$out"
          rc=0
          # (a) Structural regressions with a zero baseline — must NEVER appear.
          #     validate.sh prints an unconditional "PASS: <section> complete" footer even when the
          #     section emitted FAILs, so we inspect the actual FAIL signatures, not the footers.
          for sig in \
            "has no matching rule card" \
            "not found in README.md" \
            "missing section '" \
            "!= slug" \
            "Duplicate IDs:" \
            "Duplicate slugs:" \
            "overrides locked rule" \
            "overrides unknown rule"; do
            if echo "$out" | grep -qF "$sig"; then
              echo "::error::structural regression → $sig"
              echo "$out" | grep -F "$sig" | sed 's/^/    /'
              rc=1
            fi
          done
          # (b) No-new-failures guard. Ratchet BASELINE down as cosmetic findings are fixed.
          BASELINE=41
          fails=$(echo "$out" | grep -c "FAIL:")
          echo "validate.sh FAIL count: $fails (baseline $BASELINE)"
          if [ "$fails" -gt "$BASELINE" ]; then
            echo "::error::policy validation regressed: $fails FAILs > baseline $BASELINE"
            echo "$out" | grep "FAIL:" | sed 's/^/    /'
            rc=1
          fi
          [ "$rc" -eq 0 ] && echo "✅ No structural regressions; FAIL count within baseline."
          exit "$rc"

      - name: Plugin manifest version parity
        run: |
          pv=$(grep -m1 '"version"' .claude-plugin/plugin.json | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          mv=$(grep -m1 '"version"' .claude-plugin/marketplace.json | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "plugin.json=$pv  marketplace.json=$mv"
          [ "$pv" = "$mv" ] || { echo "::error::version mismatch between plugin.json ($pv) and marketplace.json ($mv)"; exit 1; }

      - name: Policy lint (informational)
        run: bash policy/lint.sh || true
